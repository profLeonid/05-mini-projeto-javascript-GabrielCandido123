<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Contador</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

  <div class="container">

    <a href="../index.html">← Voltar</a>

    <h1>Contador</h1>
    <p>Informe o início, fim e o salto para gerar a contagem.</p>

    <div class="campo">
      <label>Início</label>
      <input type="number" placeholder="Ex: 1"/>
    </div>

    <div class="campo">
      <label>Fim</label>
      <input type="number" placeholder="Ex: 20"/>
    </div>

    <div class="campo">
      <label>Salto</label>
      <input type="number" placeholder="Ex: 2"/>
    </div>

    <button>Gerar Contagem</button>

    <div class="resultado">
      <p class="resultado-titulo">Resultado</p>
      <ul>
        <li>1</li>
        <li>3</li>
        <li>5</li>
      </ul>
    </div>

  </div>

</body>
</html>
